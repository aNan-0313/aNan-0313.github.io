<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测试文字显示</title>
  <style>
    .work-card {
      background: #111;
      border: 1px solid #333;
      max-width: 300px;
    }
    .work-info {
      padding: 12px;
      background: #111111;
      min-height: 50px;
    }
    .work-title {
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      font-family: 'Rajdhani', sans-serif;
    }
    .work-meta {
      color: #888888;
      font-size: 12px;
      font-family: 'Rajdhani', sans-serif;
    }
  </style>
</head>
<body>
  <div class="work-card">
    <div style="width:100%; aspect-ratio:3/4; background:#222;"></div>
    <div class="work-info">
      <div class="work-title">燧发枪品宣</div>
      <div class="work-meta">Commercial / 2024</div>
    </div>
  </div>
</body>
</html>
