  <style>
/* ========================================
   aNan_Design Portfolio - Main Stylesheet
   暗黑工业风 + 复古摇滚美学
   ======================================== */

/* CSS Variables */
:root {
  /* Colors */
  --color-bg: #000000;
  --color-bg-secondary: #0a0a0a;
  --color-bg-card: #111111;
  --color-text: #FFFFFF;
  --color-text-secondary: #888888;
  --color-accent-red: #B22222;
  --color-accent-red-glow: #FF4444;
  --color-accent-silver: #C0C0C0;
  --color-border: #333333;

  /* Typography */
  --font-heading: 'Oswald', 'Impact', sans-serif;
  --font-body: 'Rajdhani', 'Arial', sans-serif;
  --font-mono: 'Courier New', monospace;

  /* Spacing */
  --spacing-xs: 0.5rem;
  --spacing-sm: 1rem;
  --spacing-md: 2rem;
  --spacing-lg: 4rem;
  --spacing-xl: 6rem;

  /* Transitions */
  --transition-fast: 0.2s ease;
  --transition-medium: 0.4s ease;
  --transition-slow: 0.6s ease;

  /* Shadows */
  --shadow-glow-red: 0 0 20px rgba(178, 34, 34, 0.5);
  --shadow-glow-silver: 0 0 20px rgba(192, 192, 192, 0.3);
}

/* Reset & Base */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-body);
  background-color: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Typography */
h1, h2, h3, h4 {
  font-family: var(--font-heading);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

h1 { font-size: clamp(2.5rem, 8vw, 5rem); }
h2 { font-size: clamp(1.8rem, 5vw, 3rem); }
h3 { font-size: clamp(1.2rem, 3vw, 1.5rem); }

p {
  font-size: 1.1rem;
  color: var(--color-text-secondary);
}

a {
  color: inherit;
  text-decoration: none;
  transition: var(--transition-fast);
}

/* Container */
.container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 var(--spacing-md);
}

/* ========================================
   Navigation
   ======================================== */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--color-border);
  padding: var(--spacing-sm) 0;
}

.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 var(--spacing-md);
}

.nav-logo {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: 0.15em;
}

.nav-logo span {
  color: var(--color-accent-red);
}

.nav-links {
  display: flex;
  gap: var(--spacing-md);
  list-style: none;
}

.nav-links a {
  font-family: var(--font-heading);
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-text-secondary);
  position: relative;
  padding: var(--spacing-xs) 0;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--color-accent-red);
  transition: var(--transition-medium);
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--color-text);
}

.nav-links a:hover::after,
.nav-links a.active::after {
  width: 100%;
}

/* Mobile Menu Toggle */
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 10px;
}

.nav-toggle span {
  width: 25px;
  height: 2px;
  background: var(--color-text);
  transition: var(--transition-fast);
}

/* ========================================
   Hero Section
   ======================================== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: var(--spacing-xl) var(--spacing-md);
  position: relative;
  overflow: hidden;
}

/* Hero Background Effect */
.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 80%, rgba(178, 34, 34, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(192, 192, 192, 0.05) 0%, transparent 50%);
  pointer-events: none;
}

/* Grid Overlay */
.hero::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero-title {
  margin-bottom: var(--spacing-sm);
}

.hero-title span {
  display: block;
  font-size: 0.4em;
  color: var(--color-accent-red);
  text-shadow: var(--shadow-glow-red);
  letter-spacing: 0.3em;
  margin-bottom: var(--spacing-xs);
}

.hero-subtitle {
  font-family: var(--font-mono);
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: var(--color-text-secondary);
  letter-spacing: 0.2em;
  margin-bottom: var(--spacing-lg);
}

.hero-cta {
  display: inline-block;
  padding: 1rem 3rem;
  font-family: var(--font-heading);
  font-size: 1rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--color-text);
  border: 2px solid var(--color-accent-red);
  background: transparent;
  cursor: pointer;
  transition: var(--transition-medium);
  position: relative;
  overflow: hidden;
}

.hero-cta::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: var(--color-accent-red);
  transition: var(--transition-medium);
  z-index: -1;
}

.hero-cta:hover {
  color: var(--color-text);
}

.hero-cta:hover::before {
  left: 0;
}

/* Scroll Indicator */
.scroll-indicator {
  position: absolute;
  bottom: var(--spacing-lg);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--spacing-xs);
  color: var(--color-text-secondary);
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  animation: bounce 2s infinite;
}

.scroll-indicator::after {
  content: '';
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--color-accent-red), transparent);
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(10px); }
}

/* ========================================
   Section Styles
   ======================================== */
.section {
  padding: var(--spacing-xl) 0;
}

.section-header {
  text-align: center;
  margin-bottom: var(--spacing-lg);
}

.section-header h2 {
  position: relative;
  display: inline-block;
}

.section-header h2::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  background: var(--color-accent-red);
  box-shadow: var(--shadow-glow-red);
}

.section-header p {
  margin-top: var(--spacing-md);
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

/* ========================================
   Works Grid
   ======================================== */
.works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--spacing-md);
}

.work-card {
  position: relative;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition-medium);
}

.work-card:hover {
  border-color: var(--color-accent-red);
  transform: translateY(-5px);
  box-shadow: var(--shadow-glow-red);
}

/* Video Badge */
.work-card .video-badge {
  position: absolute;
  top: var(--spacing-sm);
  right: var(--spacing-sm);
  background: var(--color-accent-red);
  color: var(--color-text);
  font-family: var(--font-heading);
  font-size: 0.7rem;
  padding: 0.3rem 0.8rem;
  letter-spacing: 0.1em;
  z-index: 2;
}

/* Work Thumbnail */
.work-thumbnail {
  width: 100%;
  aspect-ratio: 16/10;
  background: var(--color-bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.work-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: var(--transition-medium);
}

.work-card:hover .work-thumbnail img {
  transform: scale(1.1);
  filter: brightness(0.7);
}

/* Placeholder Thumbnail */
.work-thumbnail .placeholder {
  font-family: var(--font-heading);
  font-size: 3rem;
  color: var(--color-border);
  letter-spacing: 0.1em;
}

/* Play Icon Overlay */
.work-thumbnail .play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 60px;
  height: 60px;
  border: 2px solid var(--color-accent-red);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition-medium);
}

.work-thumbnail .play-icon::after {
  content: '';
  width: 0;
  height: 0;
  border-left: 15px solid var(--color-accent-red);
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  margin-left: 5px;
}

.work-card.video:hover .play-icon {
  transform: translate(-50%, -50%) scale(1);
}

/* Work Info */
.work-info {
  padding: var(--spacing-md);
  background: linear-gradient(to top, var(--color-bg-card), transparent);
}

.work-info h3 {
  color: var(--color-text);
  margin-bottom: var(--spacing-xs);
  font-size: 1.1rem;
}

.work-info p {
  font-size: 0.9rem;
  color: var(--color-text-secondary);
}

/* ========================================
   Work Detail Page
   ======================================== */
.work-detail {
  padding-top: 100px;
  min-height: 100vh;
}

.work-detail-header {
  text-align: center;
  margin-bottom: var(--spacing-lg);
}

.work-detail-header h1 {
  margin-bottom: var(--spacing-sm);
}

.work-detail-header .category {
  font-family: var(--font-heading);
  font-size: 0.9rem;
  color: var(--color-accent-red);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* Video Player */
.video-player {
  width: 100%;
  max-width: 1000px;
  margin: 0 auto var(--spacing-lg);
  aspect-ratio: 16/9;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.video-player video,
.video-player iframe {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.video-placeholder {
  text-align: center;
  color: var(--color-text-secondary);
}

.video-placeholder .icon {
  font-size: 4rem;
  margin-bottom: var(--spacing-sm);
  color: var(--color-accent-red);
}

/* Image Gallery */
.image-gallery {
  width: 100%;
  max-width: 1000px;
  margin: 0 auto var(--spacing-lg);
}

.image-gallery img {
  width: 100%;
  height: auto;
  border: 1px solid var(--color-border);
}

/* Project Info */
.project-info {
  max-width: 800px;
  margin: 0 auto var(--spacing-lg);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--spacing-md);
  padding: var(--spacing-md);
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
}

.project-info-item h4 {
  font-size: 0.9rem;
  color: var(--color-text-secondary);
  margin-bottom: var(--spacing-xs);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.project-info-item p {
  color: var(--color-text);
  font-size: 1rem;
}

/* Project Description */
.project-description {
  max-width: 800px;
  margin: 0 auto;
  padding: var(--spacing-lg) 0;
  border-top: 1px solid var(--color-border);
}

.project-description h3 {
  margin-bottom: var(--spacing-md);
  color: var(--color-accent-red);
}

.project-description p {
  line-height: 1.8;
  margin-bottom: var(--spacing-sm);
}

/* Back Button */
.back-button {
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-sm) var(--spacing-md);
  font-family: var(--font-heading);
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-text);
  border: 1px solid var(--color-border);
  background: transparent;
  cursor: pointer;
  transition: var(--transition-medium);
  margin-top: var(--spacing-lg);
}

.back-button:hover {
  border-color: var(--color-accent-red);
  color: var(--color-accent-red);
}

/* ========================================
   About Page
   ======================================== */
.about-hero {
  padding-top: 120px;
  padding-bottom: var(--spacing-xl);
  text-align: center;
}

.about-avatar {
  width: 150px;
  height: 150px;
  margin: 0 auto var(--spacing-md);
  border: 3px solid var(--color-accent-red);
  border-radius: 50%;
  background: var(--color-bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-size: 4rem;
  color: var(--color-accent-red);
  box-shadow: var(--shadow-glow-red);
}

.about-intro {
  max-width: 700px;
  margin: 0 auto;
}

.about-intro h1 {
  margin-bottom: var(--spacing-xs);
}

.about-intro .title {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--color-accent-red);
  letter-spacing: 0.15em;
  margin-bottom: var(--spacing-md);
}

.about-intro p {
  line-height: 1.8;
}

/* Skills Section */
.skills-section {
  background: var(--color-bg-secondary);
  padding: var(--spacing-xl) 0;
}

.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: var(--spacing-lg);
  margin-top: var(--spacing-lg);
}

.skill-category h3 {
  margin-bottom: var(--spacing-md);
  padding-bottom: var(--spacing-xs);
  border-bottom: 2px solid var(--color-accent-red);
}

.skill-list {
  list-style: none;
}

.skill-list li {
  padding: var(--spacing-xs) 0;
  color: var(--color-text-secondary);
  position: relative;
  padding-left: var(--spacing-md);
}

.skill-list li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--color-accent-red);
}

/* Software Section */
.software-section {
  padding: var(--spacing-xl) 0;
}

.software-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--spacing-md);
  margin-top: var(--spacing-lg);
}

.software-item {
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  font-family: var(--font-heading);
  font-size: 1rem;
  letter-spacing: 0.1em;
  transition: var(--transition-medium);
}

.software-item:hover {
  border-color: var(--color-accent-silver);
  color: var(--color-accent-silver);
  box-shadow: var(--shadow-glow-silver);
}

/* ========================================
   Contact Section
   ======================================== */
.contact-section {
  padding: var(--spacing-xl) 0;
  background: var(--color-bg-secondary);
  text-align: center;
}

.contact-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--spacing-md);
  margin-top: var(--spacing-lg);
}

.contact-link {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  color: var(--color-text-secondary);
  font-family: var(--font-heading);
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  transition: var(--transition-medium);
}

.contact-link:hover {
  border-color: var(--color-accent-red);
  color: var(--color-accent-red);
}

.contact-link .icon {
  font-size: 1.2rem;
}

/* ========================================
   Footer
   ======================================== */
.footer {
  padding: var(--spacing-md) 0;
  text-align: center;
  border-top: 1px solid var(--color-border);
}

.footer p {
  font-size: 0.9rem;
  color: var(--color-text-secondary);
}

.footer span {
  color: var(--color-accent-red);
}

/* ========================================
   Responsive Design
   ======================================== */
@media (max-width: 768px) {
  /* Navigation */
  .nav-toggle {
    display: flex;
  }

  .nav-links {
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.98);
    flex-direction: column;
    padding: var(--spacing-md);
    gap: var(--spacing-sm);
    border-bottom: 1px solid var(--color-border);
    transform: translateY(-100%);
    opacity: 0;
    visibility: hidden;
    transition: var(--transition-medium);
  }

  .nav-links.active {
    transform: translateY(0);
    opacity: 1;
    visibility: visible;
  }

  /* Works Grid */
  .works-grid {
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: var(--spacing-sm);
  }

  /* Hero */
  .hero {
    padding: var(--spacing-lg) var(--spacing-sm);
  }

  .scroll-indicator {
    display: none;
  }

  /* Section */
  .section {
    padding: var(--spacing-lg) 0;
  }

  /* Contact Links */
  .contact-links {
    flex-direction: column;
    align-items: center;
  }
}

@media (max-width: 480px) {
  .container {
    padding: 0 var(--spacing-sm);
  }

  .works-grid {
    grid-template-columns: 1fr;
  }

  .project-info {
    grid-template-columns: 1fr;
  }

  .skills-grid {
    grid-template-columns: 1fr;
  }
}

/* ========================================
   Animations
   ======================================== */
.fade-in {
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Page Load Animation */
.page-content {
  opacity: 0;
  animation: pageLoad 0.8s ease forwards;
  animation-delay: 0.2s;
}

@keyframes pageLoad {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}
  </style>
</head>

// ========================================
// DOM 加载完成后初始化
// ========================================
document.addEventListener('DOMContentLoaded', function() {
  initNavigation();
  initMobileMenu();
  initScrollEffects();
  
  // 如果在首页，加载作品网格
  if (document.getElementById('works-container')) {
    loadWorksGrid();
  }
});

// ========================================
// 导航功能
// ========================================
function initNavigation() {
  // 获取当前页面路径，高亮对应导航项
  const currentPath = window.location.pathname;
  const navLinks = document.querySelectorAll('.nav-links a');
  
  navLinks.forEach(link => {
    const href = link.getAttribute('href');
    if (currentPath.includes(href) && href !== 'index_single.html') {
      link.classList.add('active');
    } else if (currentPath === '/' || currentPath.includes('index_single.html') || currentPath === '') {
      if (href === 'index_single.html') {
        link.classList.add('active');
      }
    }
  });
}

// ========================================
// 移动端菜单
// ========================================
function initMobileMenu() {
  const navToggle = document.querySelector('.nav-toggle');
  const navLinks = document.querySelector('.nav-links');
  
  if (navToggle && navLinks) {
    navToggle.addEventListener('click', function() {
      navLinks.classList.toggle('active');
      this.classList.toggle('active');
    });
    
    // 点击链接后关闭菜单
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
        navToggle.classList.remove('active');
      });
    });
  }
}

// ========================================
// 滚动效果
// ========================================
function initScrollEffects() {
  // 导航栏滚动效果
  const nav = document.querySelector('.nav');
  let lastScroll = 0;
  
  window.addEventListener('scroll', () => {
    const currentScroll = window.pageYOffset;
    
    // 添加/移除滚动阴影
    if (currentScroll > 50) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
    
    lastScroll = currentScroll;
  });
  
  // 滚动显示动画
  const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  };
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, observerOptions);
  
  // 观察需要动画的元素
  document.querySelectorAll('.work-card, .skill-category, .software-item').forEach(el => {
    el.classList.add('fade-in');
    observer.observe(el);
  });
}

// ========================================
// 加载作品网格
// ========================================
function loadWorksGrid() {
  const container = document.getElementById('works-container');
  if (!container) return;
  
  // 合并视频和图片作品
  const allWorks = [
    ...worksData.video.map(w => ({...w, type: 'video'})),
    ...worksData.image.map(w => ({...w, type: 'image'}))
  ];
  
  // 按ID排序
  allWorks.sort((a, b) => a.id - b.id);
  
  // 生成HTML
  container.innerHTML = allWorks.map(work => `
    <article class="work-card ${work.type}" data-id="${work.id}" data-type="${work.type}">
      ${work.type === 'video' ? '<span class="video-badge">VIDEO</span>' : '<span class="video-badge" style="background: var(--color-accent-silver);">IMAGE</span>'}
      <div class="work-thumbnail">
        ${work.thumbnail 
          ? `<img src="${work.thumbnail}" alt="${work.title}" loading="lazy">`
          : `<div class="placeholder">${work.type === 'video' ? '▶' : '◼'}</div>`
        }
        <div class="play-icon"></div>
      </div>
      <div class="work-info">
        <h3>${work.title}</h3>
        <p>${work.category} / ${work.year}</p>
      </div>
    </article>
  `).join('');
  
  // 添加点击事件
  container.querySelectorAll('.work-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const type = card.dataset.type;
      window.location.href = `work.html?id=${id}&type=${type}`;
    });
  });
}

// ========================================
// 获取URL参数
// ========================================
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    id: params.get('id'),
    type: params.get('type')
  };
}

// ========================================
// 加载作品详情
// ========================================
function loadWorkDetail() {
  const { id, type } = getUrlParams();
  if (!id) {
    window.location.href = 'index_single.html';
    return;
  }
  
  // 找到对应作品
  const works = type === 'video' ? worksData.video : worksData.image;
  const work = works.find(w => w.id == id);
  
  if (!work) {
    window.location.href = 'index_single.html';
    return;
  }
  
  // 填充页面内容
  document.getElementById('work-title').textContent = work.title;
  document.getElementById('work-category').textContent = work.category;
  document.getElementById('work-year').textContent = work.year;
  document.getElementById('work-description').textContent = work.description;
  
  // 设置媒体展示
  const mediaContainer = document.getElementById('media-container');
  if (type === 'video') {
    // 判断是否为Vimeo链接
    if (work.videoUrl && work.videoUrl.includes('vimeo.com')) {
      mediaContainer.innerHTML = `
        <div class="video-player" style="padding: 56.25% 0 0 0; position: relative;">
          <iframe src="${work.videoUrl}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
        </div>
      `;
    } else {
      mediaContainer.innerHTML = `
        <div class="video-player">
          <video controls autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover; background: #000;">
            <source src="${work.videoUrl || work.thumbnail}" type="video/mp4">
            您的浏览器不支持视频播放
          </video>
        </div>
      `;
    }
  } else {
    mediaContainer.innerHTML = `
      <div class="image-gallery">
        <img src="${work.imageUrl || work.thumbnail}" alt="${work.title}" style="width: 100%; height: auto; object-fit: contain; background: #000;">
      </div>
    `;
  }
  
  // 更新页面标题
  document.title = `${work.title} - aNan_Design`;
}

// ========================================
// 平滑滚动到锚点

function smoothScrollTo(target) {
  const element = document.querySelector(target);
  if (element) {
    element.scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  }
}

    const backBtn = document.querySelector('.back-button');
    if (backBtn) {
      backBtn.click();
    }
  }
});
